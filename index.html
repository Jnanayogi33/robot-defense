<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Future Defense: Robot Uprising</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="portrait-warn">
  <div class="icon">📱↻</div>
  <p>ROTATE TO LANDSCAPE<br>TO PLAY</p>
</div>

<div id="layout">
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
  <div id="sidebar">
    <h1>Future Defense</h1>
    <div id="hud">
      <span>Credits: <span class="val" id="money">200</span></span>
      <span>Wave: <span class="val" id="wave">0</span></span>
      <span>Lives: <span class="val" id="lives">20</span></span>
      <span>Score: <span class="val" id="score">0</span></span>
    </div>
    <div id="shop"></div>
    <div id="controls">
      <button onclick="startWave()">▶ Next Wave</button>
      <button onclick="sellMode()">💰 Sell</button>
      <button onclick="toggleFuse()" id="fuse-btn">🔀 Fuse</button>
      <button class="spd-btn selected" data-spd="1" onclick="setSpeed(1)">1×</button>
      <button class="spd-btn" data-spd="2" onclick="setSpeed(2)">2×</button>
      <button class="spd-btn" data-spd="5" onclick="setSpeed(5)">5×</button>
      <button onclick="Music.toggle()" id="music-btn">🔊</button>
    </div>
    <div id="overclock-bar" style="display:none"><div id="overclock-fill"></div></div>
    <div id="msg"></div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="ov-title"></h2>
    <p id="ov-text"></p>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>
<script src="js/game.js"></script>
<script src="js/particles.js"></script>
<script src="js/draw.js"></script>
<script src="js/audio.js"></script>
</body>
</html>
